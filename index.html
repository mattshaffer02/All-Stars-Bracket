<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Stars 11 · Pick 'Em</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(160deg,#fff5fa 0%,#f3ecff 50%,#fff8e1 100%); min-height: 100vh; font-family: Georgia, serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const QUEENS = {
      pink: [
        { id: "akeria",  name: "A'Keria C. Davenport",  season: "S11, AS6", emoji: "👑" },
        { id: "april",   name: "April Carrión",          season: "S6",       emoji: "🌸" },
        { id: "crystal", name: "Crystal Methyd",         season: "S12",      emoji: "💎" },
        { id: "jasmine", name: "Jasmine Kennedie",       season: "S14",      emoji: "🌺" },
        { id: "kennedy", name: "Kennedy Davenport",      season: "S7, AS3",  emoji: "⚡" },
        { id: "morgan",  name: "Morgan McMichaels",      season: "S2, AS3",  emoji: "🔥" },
      ],
      orange: [
        { id: "aura",     name: "Aura Mayari",           season: "S15", emoji: "✨" },
        { id: "dawn",     name: "Dawn",                  season: "S16", emoji: "🌅" },
        { id: "hershii",  name: "Hershii LiqCour-Jeté",  season: "S16", emoji: "💫" },
        { id: "joey",     name: "Joey Jay",              season: "S13", emoji: "🎉" },
        { id: "lucky",    name: "Lucky Starzzz",         season: "S17", emoji: "⭐" },
        { id: "vivacious",name: "Vivacious",             season: "S6",  emoji: "🦋" },
      ],
      purple: [
        { id: "morphine", name: "Morphine Love Dion",     season: "S16",      emoji: "💜" },
        { id: "mystique", name: "Mystique Summers",       season: "S2",       emoji: "🔮" },
        { id: "salina",   name: "Salina EsTitties",       season: "S15",      emoji: "🍑" },
        { id: "sam",      name: "Sam Star",               season: "S17",      emoji: "🌟" },
        { id: "shuga",    name: "Shuga Cain",             season: "S11",      emoji: "🍬" },
        { id: "silky",    name: "Silky Nutmeg Ganache",   season: "S11, AS6", emoji: "✨" },
      ],
    };

    const ALL_QUEENS = [...QUEENS.pink, ...QUEENS.orange, ...QUEENS.purple];

    const BC = {
      pink:   { bg: "#ff6b9d", light: "#ffe0ee", text: "#880e4f" },
      orange: { bg: "#ff8c42", light: "#fff0e6", text: "#bf360c" },
      purple: { bg: "#9c6fde", light: "#f3ecff", text: "#311b92" },
    };

    const EP_OPTS = [
      { key: "win",  label: "🏆 Win",   pts: 5, color: "#ff6b9d" },
      { key: "top2", label: "🥈 Top 2", pts: 3, color: "#ff8c42" },
      { key: "safe", label: "✅ Safe",  pts: 1, color: "#4caf50" },
      { key: "elim", label: "❌ Elim",  pts: 0, color: "#bbb"    },
    ];

    const BEP = { pink:["Ep 1","Ep 2","Ep 3"], orange:["Ep 4","Ep 5","Ep 6"], purple:["Ep 7","Ep 8","Ep 9"] };
    const SEP = ["Ep 10","Ep 11"];

    const KEY = "as11_bracket_data";
    const VER = 2;

    function migrate(raw) {
      if (!raw) return null;
      let d;
      try { d = typeof raw === "string" ? JSON.parse(raw) : raw; } catch { return null; }
      if (!d.version || d.version < 2) {
        const res = d.results || {};
        Object.keys(res).forEach(qid => {
          const r = res[qid];
          if (!r.episodes) r.episodes = [null,null,null];
          while (r.episodes.length < 3) r.episodes.push(null);
          if (!r.semiEpisodes) r.semiEpisodes = [null,null];
          if (r.advances  === undefined) r.advances  = false;
          if (r.finalist  === undefined) r.finalist  = false;
          delete r.win; delete r.top2; delete r.safe; delete r.elim;
        });
        d.version = VER;
      }
      if (!d.players) d.players = [];
      if (!d.picks)   d.picks   = {};
      if (!d.results) d.results = {};
      return d;
    }

    function load() {
      try { const r = localStorage.getItem(KEY); return r ? migrate(r) : null; } catch { return null; }
    }
    function save(d) {
      try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {}
    }

    const blank = () => ({ episodes:[null,null,null], semiEpisodes:[null,null], advances:false, finalist:false });

    function getR(res, qid) {
      const r = res[qid];
      if (!r) return blank();
      return { episodes:r.episodes||[null,null,null], semiEpisodes:r.semiEpisodes||[null,null], advances:r.advances||false, finalist:r.finalist||false };
    }

    function pts(r) {
      let p = 0;
      [...(r.episodes||[]),...(r.semiEpisodes||[])].forEach(ep => { const o=EP_OPTS.find(x=>x.key===ep); if(o) p+=o.pts; });
      if (r.advances) p += 10;
      if (r.finalist) p += 25;
      return p;
    }

    const INIT = { version:VER, players:[], picks:{}, results:{} };

    // Shared styles
    const H2 = { fontFamily:"'Playfair Display',serif", fontSize:26, color:"#2d0036", marginTop:0, marginBottom:20 };
    const BTN = (c) => ({ padding:"12px 20px", borderRadius:12, border:"none", background:c, color:"#fff", cursor:"pointer", fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700 });

    function App() {
      const [st, setSt] = useState(() => load() || INIT);
      const [view, setView] = useState("home");
      const [newP, setNewP] = useState("");

      useEffect(() => { save(st); }, [st]);

      const addPlayer = () => {
        const n = newP.trim();
        if (!n || st.players.includes(n)) return;
        setSt(s => ({ ...s, players:[...s.players,n], picks:{...s.picks,[n]:{}} }));
        setNewP("");
      };

      const togglePick = (player, qid) => {
        setSt(s => { const c=s.picks[player]||{}; return {...s, picks:{...s.picks,[player]:{...c,[qid]:!c[qid]}}}; });
      };

      const setEp = (qid, idx, val, semi=false) => {
        setSt(s => {
          const r=getR(s.results,qid), k=semi?"semiEpisodes":"episodes", a=[...r[k]];
          a[idx] = a[idx]===val ? null : val;
          return {...s, results:{...s.results,[qid]:{...r,[k]:a}}};
        });
      };

      const setFlag = (qid, flag) => {
        setSt(s => {
          const r=getR(s.results,qid);
          if (flag==="finalist") {
            const nr={};
            Object.keys(s.results).forEach(id => { nr[id]={...getR(s.results,id),finalist:false}; });
            nr[qid]={...r,finalist:!r.finalist};
            return {...s,results:nr};
          }
          return {...s,results:{...s.results,[qid]:{...r,[flag]:!r[flag]}}};
        });
      };

      const score = (p) => {
        const pk=st.picks[p]||{};
        return Object.keys(pk).reduce((s,qid)=>pk[qid]?s+pts(getR(st.results,qid)):s,0);
      };

      const advancers = ALL_QUEENS.filter(q=>getR(st.results,q.id).advances);
      const board = [...st.players].sort((a,b)=>score(b)-score(a));
      const pickedBy = (qid) => st.players.filter(p=>st.picks[p]?.[qid]);

      const BackBtn = () => (
        <button onClick={()=>setView("home")} style={{background:"none",border:"none",cursor:"pointer",color:"#9c6fde",fontFamily:"'Playfair Display',serif",fontSize:16,marginBottom:12,padding:0,display:"flex",alignItems:"center",gap:6}}>← Back</button>
      );

      const EpGrid = ({qid,arr,labels,semi}) => (
        <div style={{display:"grid",gridTemplateColumns:`repeat(${labels.length},1fr)`,gap:6,marginBottom:10}}>
          {labels.map((lbl,i) => {
            const cur=arr[i];
            return (
              <div key={i} style={{display:"flex",flexDirection:"column",gap:3}}>
                <div style={{color:"#ccc",fontSize:10,textAlign:"center",fontWeight:700,letterSpacing:".5px"}}>{lbl}</div>
                {EP_OPTS.map(o => {
                  const on=cur===o.key;
                  return (
                    <button key={o.key} onClick={()=>setEp(qid,i,o.key,semi)}
                      style={{padding:"4px 3px",borderRadius:7,border:"2px solid",borderColor:on?o.color:"#eee",background:on?o.color:"transparent",color:on?"#fff":"#bbb",cursor:"pointer",fontSize:11,fontWeight:700,textAlign:"center",transition:"all .1s"}}>
                      {o.label}{on?` +${o.pts}`:""}
                    </button>
                  );
                })}
              </div>
            );
          })}
        </div>
      );

      // ── HOME ──
      if (view==="home") return (
        <div style={{textAlign:"center",padding:"40px 24px"}}>
          <div style={{fontSize:64,marginBottom:8}}>👑</div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(28px,7vw,52px)",color:"#2d0036",margin:0,letterSpacing:"-1px"}}>All Stars 11</h1>
          <p style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#9c6fde",fontSize:20,margin:"4px 0 32px"}}>Tournament of All Stars · Pick 'Em</p>
          <div style={{display:"grid",gap:14,maxWidth:340,margin:"0 auto"}}>
            {[["👥 Manage Players","setup"],["🗳️ Submit Picks","picks"],["📋 Enter Results","results"],["🏆 Leaderboard","leaderboard"]].map(([lbl,v])=>(
              <button key={v} onClick={()=>setView(v)}
                style={{padding:"16px 24px",borderRadius:16,border:"none",cursor:"pointer",background:v==="leaderboard"?"linear-gradient(135deg,#ff6b9d,#9c6fde)":"#fff",color:v==="leaderboard"?"#fff":"#2d0036",boxShadow:"0 4px 20px rgba(0,0,0,0.12)",fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,transition:"transform .15s"}}
                onMouseOver={e=>e.currentTarget.style.transform="scale(1.03)"}
                onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>{lbl}</button>
            ))}
          </div>
          <p style={{marginTop:40,color:"#bbb",fontSize:13}}>12 episodes · Premieres May 8, 2026 · Paramount+</p>
        </div>
      );

      // ── PLAYERS ──
      if (view==="setup") return (
        <div style={{padding:"24px 20px",maxWidth:500,margin:"0 auto"}}>
          <BackBtn/>
          <h2 style={H2}>👥 Players</h2>
          <div style={{display:"flex",gap:10,marginBottom:20}}>
            <input value={newP} onChange={e=>setNewP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPlayer()} placeholder="Add player name…"
              style={{flex:1,padding:"12px 16px",borderRadius:12,border:"2px solid #e0d0ff",fontFamily:"'Playfair Display',serif",fontSize:16,outline:"none"}}/>
            <button onClick={addPlayer} style={BTN("#9c6fde")}>Add</button>
          </div>
          {st.players.length===0 && <p style={{color:"#bbb",textAlign:"center"}}>No players yet.</p>}
          {st.players.map(p=>(
            <div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fff",borderRadius:14,padding:"14px 18px",marginBottom:10,boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}}>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"#2d0036"}}>{p}</span>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{color:"#9c6fde",fontWeight:700}}>{score(p)} pts</span>
                <button onClick={()=>setSt(s=>{const pl=s.players.filter(x=>x!==p);const pk={...s.picks};delete pk[p];return{...s,players:pl,picks:pk};})} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:18}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      );

      // ── PICKS ──
      if (view==="picks") {
        const PicksInner = () => {
          const [player, setPlayer] = useState(st.players[0]||null);
          return (
            <div style={{padding:"24px 20px",maxWidth:560,margin:"0 auto"}}>
              <BackBtn/>
              <h2 style={H2}>🗳️ Submit Picks</h2>
              {st.players.length===0 ? <p style={{color:"#bbb",textAlign:"center"}}>Add players first.</p> : <>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
                  {st.players.map(p=>(
                    <button key={p} onClick={()=>setPlayer(p)} style={{padding:"8px 16px",borderRadius:20,border:"2px solid",borderColor:player===p?"#9c6fde":"#e0d0ff",background:player===p?"#9c6fde":"#fff",color:player===p?"#fff":"#9c6fde",cursor:"pointer",fontFamily:"'Playfair Display',serif",fontSize:15}}>{p}</button>
                  ))}
                </div>
                {player && <>
                  <p style={{color:"#888",fontSize:13,marginBottom:16}}>Pick queens you think will slay. Win +5 · Top2 +3 · Safe +1 · Advances +10 · Wins Crown +25</p>
                  {["pink","orange","purple"].map(b=>(
                    <div key={b} style={{marginBottom:24}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                        <div style={{width:14,height:14,borderRadius:"50%",background:BC[b].bg}}/>
                        <span style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:18,color:BC[b].text,textTransform:"capitalize"}}>{b} Bracket</span>
                      </div>
                      {QUEENS[b].map(q=>{
                        const picked=st.picks[player]?.[q.id];
                        return (
                          <div key={q.id} onClick={()=>togglePick(player,q.id)}
                            style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:picked?BC[b].light:"#fff",border:`2px solid ${picked?BC[b].bg:"#eee"}`,borderRadius:12,padding:"12px 16px",marginBottom:8,cursor:"pointer",transition:"all .15s"}}>
                            <div>
                              <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,color:"#2d0036",fontSize:16}}>{q.emoji} {q.name}</div>
                              <div style={{color:"#999",fontSize:13}}>{q.season}</div>
                            </div>
                            <div style={{width:28,height:28,borderRadius:"50%",background:picked?BC[b].bg:"transparent",border:`2px solid ${picked?BC[b].bg:"#ddd"}`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16}}>{picked?"✓":""}</div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                  <p style={{color:"#bbb",textAlign:"center",fontSize:13}}>{Object.values(st.picks[player]||{}).filter(Boolean).length} queens selected</p>
                </>}
              </>}
            </div>
          );
        };
        return <PicksInner/>;
      }

      // ── RESULTS ──
      if (view==="results") {
        const ResultsInner = () => {
          const [sec, setSec] = useState("brackets");
          return (
            <div style={{padding:"24px 20px",maxWidth:620,margin:"0 auto"}}>
              <BackBtn/>
              <h2 style={H2}>📋 Record Results</h2>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:24}}>
                {[["brackets","🪩 Brackets","Eps 1–9"],["semis","⚡ Semis","Eps 10–11"],["finale","👑 Finale","Ep 12"]].map(([k,lbl,sub])=>(
                  <button key={k} onClick={()=>setSec(k)} style={{padding:"10px 6px",borderRadius:12,border:"2px solid",borderColor:sec===k?"#9c6fde":"#eee",background:sec===k?"#9c6fde":"#fff",color:sec===k?"#fff":"#999",cursor:"pointer",fontWeight:700,lineHeight:1.3}}>
                    <div style={{fontSize:14}}>{lbl}</div><div style={{fontSize:11,opacity:.8}}>{sub}</div>
                  </button>
                ))}
              </div>

              {sec==="brackets" && ["pink","orange","purple"].map(b=>(
                <div key={b} style={{marginBottom:32}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <div style={{width:14,height:14,borderRadius:"50%",background:BC[b].bg}}/>
                    <span style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:18,color:BC[b].text,textTransform:"capitalize"}}>{b} Bracket</span>
                    <span style={{color:"#bbb",fontSize:13}}>({b==="pink"?"Eps 1–3":b==="orange"?"Eps 4–6":"Eps 7–9"})</span>
                  </div>
                  {QUEENS[b].map(q=>{
                    const r=getR(st.results,q.id);
                    return (
                      <div key={q.id} style={{background:"#fff",borderRadius:14,padding:"12px 14px",marginBottom:10,boxShadow:"0 2px 12px rgba(0,0,0,0.07)"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,color:"#2d0036",fontSize:15}}>{q.emoji} {q.name}</div>
                          <span style={{fontWeight:700,color:"#9c6fde",fontSize:13}}>{pts(r)} pts</span>
                        </div>
                        <EpGrid qid={q.id} arr={r.episodes} labels={BEP[b]} semi={false}/>
                        <div style={{borderTop:"1px solid #f5f0ff",paddingTop:10}}>
                          <button onClick={()=>setFlag(q.id,"advances")} style={{padding:"5px 14px",borderRadius:20,border:"2px solid",borderColor:r.advances?"#9c6fde":"#eee",background:r.advances?"#9c6fde":"transparent",color:r.advances?"#fff":"#aaa",cursor:"pointer",fontSize:12,fontWeight:700}}>
                            ⬆️ Advances to Semis (+10)
                          </button>
                        </div>
                        {pickedBy(q.id).length>0 && <p style={{color:"#ccc",fontSize:12,marginTop:8,marginBottom:0}}>Picked by: {pickedBy(q.id).join(", ")}</p>}
                      </div>
                    );
                  })}
                </div>
              ))}

              {sec==="semis" && <div>
                <p style={{color:"#888",fontSize:13,marginBottom:20}}>Top 2 from each bracket (6 queens) compete in Eps 10 & 11. Mark advancing queens in the Brackets tab first.</p>
                {advancers.length===0 && <p style={{color:"#ccc",textAlign:"center",marginTop:40}}>No queens marked as advancing yet.</p>}
                {advancers.map(q=>{
                  const r=getR(st.results,q.id);
                  const b=Object.keys(QUEENS).find(x=>QUEENS[x].some(y=>y.id===q.id));
                  return (
                    <div key={q.id} style={{background:"#fff",borderRadius:14,padding:"12px 14px",marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.07)",borderLeft:`4px solid ${BC[b].bg}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div>
                          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,color:"#2d0036",fontSize:15}}>{q.emoji} {q.name}</div>
                          <div style={{color:BC[b].text,fontSize:12,fontWeight:700,textTransform:"capitalize"}}>{b} bracket</div>
                        </div>
                        <span style={{fontWeight:700,color:"#9c6fde",fontSize:13}}>{pts(r)} pts total</span>
                      </div>
                      <EpGrid qid={q.id} arr={r.semiEpisodes} labels={SEP} semi={true}/>
                      {pickedBy(q.id).length>0 && <p style={{color:"#ccc",fontSize:12,marginTop:4,marginBottom:0}}>Picked by: {pickedBy(q.id).join(", ")}</p>}
                    </div>
                  );
                })}
              </div>}

              {sec==="finale" && <div>
                <p style={{color:"#888",fontSize:13,marginBottom:20}}>Ep 12 — Lip Sync Smackdown for the Crown. Tap the winner to award +25 pts.</p>
                {advancers.length===0 && <p style={{color:"#ccc",textAlign:"center"}}>Mark advancing queens in Brackets tab first.</p>}
                {advancers.map(q=>{
                  const r=getR(st.results,q.id);
                  const b=Object.keys(QUEENS).find(x=>QUEENS[x].some(y=>y.id===q.id));
                  return (
                    <div key={q.id} onClick={()=>setFlag(q.id,"finalist")}
                      style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:r.finalist?"#fffbe6":"#fff",border:`2px solid ${r.finalist?"#ffd700":"#eee"}`,borderRadius:14,padding:"16px 18px",marginBottom:10,cursor:"pointer",boxShadow:r.finalist?"0 4px 20px rgba(255,215,0,0.3)":"0 2px 12px rgba(0,0,0,0.07)",transition:"all .15s"}}>
                      <div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,color:"#2d0036",fontSize:17}}>{r.finalist?"👑 ":""}{q.emoji} {q.name}</div>
                        <div style={{color:BC[b].text,fontSize:12,fontWeight:700,textTransform:"capitalize"}}>{b} bracket · {pts(r)} pts so far</div>
                        {pickedBy(q.id).length>0 && <div style={{color:"#bbb",fontSize:12,marginTop:3}}>Picked by: {pickedBy(q.id).join(", ")}</div>}
                      </div>
                      <div style={{fontSize:36}}>{r.finalist?"🏆":"○"}</div>
                    </div>
                  );
                })}
                {advancers.length>0 && !advancers.some(q=>getR(st.results,q.id).finalist) && <p style={{color:"#ccc",textAlign:"center",fontSize:13,marginTop:20}}>Tap a queen to crown the winner.</p>}
              </div>}
            </div>
          );
        };
        return <ResultsInner/>;
      }

      // ── LEADERBOARD ──
      if (view==="leaderboard") return (
        <div style={{padding:"24px 20px",maxWidth:500,margin:"0 auto"}}>
          <BackBtn/>
          <h2 style={H2}>🏆 Leaderboard</h2>
          {board.length===0 ? <p style={{color:"#bbb",textAlign:"center"}}>No players yet.</p> : <>
            {board.map((p,i)=>{
              const sc=score(p);
              const picked=ALL_QUEENS.filter(q=>st.picks[p]?.[q.id]);
              return (
                <div key={p} style={{background:"#fff",borderRadius:18,padding:"18px 20px",marginBottom:14,boxShadow:i===0?"0 4px 30px rgba(156,111,222,0.3)":"0 2px 12px rgba(0,0,0,0.08)",border:i===0?"2px solid #9c6fde":"2px solid transparent"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:40,height:40,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:i===0?"linear-gradient(135deg,#ffd700,#ff8c42)":i===1?"#e0e0e0":i===2?"#cd7f32":"#f5f5f5",fontSize:20,fontWeight:800,color:i<3?"#fff":"#aaa"}}>{i===0?"👑":i+1}</div>
                      <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#2d0036"}}>{p}</span>
                    </div>
                    <span style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:800,background:"linear-gradient(135deg,#ff6b9d,#9c6fde)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{sc}</span>
                  </div>
                  {picked.length>0 && (
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {picked.map(q=>{
                        const r=getR(st.results,q.id);
                        const ae=[...r.episodes,...r.semiEpisodes];
                        const badge=r.finalist?"👑":r.advances?"⬆️":ae.includes("win")?"🏆":ae.includes("top2")?"🥈":ae.includes("safe")?"✅":ae.includes("elim")?"❌":"";
                        const p2=pts(r);
                        return <span key={q.id} style={{background:"#f5f0ff",borderRadius:20,padding:"4px 10px",fontSize:13,color:"#6a3d9a"}}>{badge} {q.name.split(" ")[0]}{p2>0?` +${p2}`:""}</span>;
                      })}
                    </div>
                  )}
                </div>
              );
            })}
            <p style={{color:"#ccc",fontSize:12,textAlign:"center",marginTop:20}}>Win +5 · Top2 +3 · Safe +1 · Advances +10 · Wins Crown +25</p>
          </>}
        </div>
      );

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

</body>
</html>
